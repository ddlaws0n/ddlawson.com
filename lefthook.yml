# Documentation Reference: https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{ts,tsx,js,jsx,astro,css,md,json}'
      run: pnpm prettier --write {staged_files} && git update-index --again

    lint:
      glob: '*.{ts,tsx,js,jsx,astro}'
      run: pnpm eslint --fix {staged_files} && git update-index --again

    typecheck:
      run: pnpm astro check

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

pre-push:
  commands:
    check:
      tags: lint
      files: git diff --name-only $(git merge-base origin/main HEAD)
      glob: '*.{js,jsx,ts,tsx,astro}'
      run: pnpm run check
