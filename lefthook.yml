# Documentation Reference: https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  commands:
    format:
      glob: "src/**/*.{ts,tsx,js,jsx,css}"
      run: pnpm format {staged_files} && git update-index --again && echo "Code formatted successfully."

    lint:
      glob: "src/**/*.{ts,tsx,js,jsx,css}"
      run: pnpm lint {staged_files} && git update-index --again && echo "Code linted successfully."

    # update-env-example:
    #   tags: prepare:env-file
    #   run: |
    #     cp .env .env.example || cp .env.local .env.example
    #     sed -i '' 's/=\(.*\)/=""/' .env.example
    #     echo "Updated .env.example successfully."

pre-push:
  commands:
    debug:
      run: echo "----- Running pre-push hook -----" && which node && node --version

    check:
      tags: lint
      files: git diff --name-only $(git merge-base origin/main HEAD)
      glob: "src/**/*.{js,jsx,ts,tsx}"
      run: pnpm run check && echo "Types checked successfully."
